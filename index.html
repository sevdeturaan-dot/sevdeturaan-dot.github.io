<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolyo | Bilgisayar Mühendisi Adayı</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white p-6 font-sans">
    <div class="max-w-6xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 auto-rows-[200px]">
        <div
          class="md:col-span-2 md:row-span-2 bg-gray-800 p-8 rounded-3xl border border-gray-700 flex flex-col justify-center"
        >
          <h1 class="text-4xl font-bold mb-4">Merhaba, Ben Sevde 👋</h1>
          <p class="text-gray-400 text-lg">
            2026 hedeflerim doğrultusunda Full-Stack ve AI teknolojileri üzerine
            çalışıyorum.
          </p>
        </div>

        <div class="bg-blue-600 p-6 rounded-3xl flex flex-col justify-between">
          <h3 class="font-bold text-xl">GitHub Stats</h3>
          <div class="text-3xl font-mono">100+ Commits</div>
        </div>

        <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700">
          <h3 class="font-bold mb-2">Tech Stack</h3>
          <div class="flex flex-wrap gap-2 text-xs">
            <span class="bg-gray-700 px-2 py-1 rounded">HTML5</span>
            <span class="bg-gray-700 px-2 py-1 rounded">Tailwind</span>
            <span class="bg-gray-700 px-2 py-1 rounded">JavaScript</span>
          </div>
        </div>

        <div
          class="md:col-span-2 bg-gray-800 p-6 rounded-3xl border border-gray-700 hover:border-blue-500 transition cursor-pointer"
        >
          <h3 class="font-bold text-xl mb-2">Öne Çıkan Projeler</h3>
          <p class="text-sm text-gray-400">
            Geliştirdiğim modern web uygulamaları .
          </p>
        </div>

        <div
          class="bg-pink-600 p-6 rounded-3xl flex items-center justify-center text-2xl font-bold"
        >
          İletişime Geç
        </div>
      </div>
    </div>
  </body>
</html>
