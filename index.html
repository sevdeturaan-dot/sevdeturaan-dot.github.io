<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolyo |</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* 2026 Tasarım Trendi: Yumuşak Köşeler (Squircle) */
      .bento-item {
        @apply bg-gray-800/40 rounded-[2rem] border border-gray-700/50 backdrop-blur-sm 
                   transition-all duration-500 ease-out hover:scale-[1.02] 
                   hover:bg-gray-800/60 hover:border-blue-500/50 hover:shadow-2xl hover:shadow-blue-500/10;
      }
    </style>
  </head>
  <body class="bg-[#0d1117] text-white font-sans selection:bg-blue-500/30">
    <main class="max-w-6xl mx-auto p-6 md:p-16">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 auto-rows-min">
        <section
          class="md:col-span-3 md:row-span-2 bento-item p-10 flex flex-col justify-center relative overflow-hidden group"
        >
          <div
            class="absolute -right-20 -top-20 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl group-hover:bg-blue-600/20 transition-all duration-700"
          ></div>
          <span
            class="text-blue-400 font-mono text-sm uppercase tracking-[0.2em] mb-4 font-bold"
            >2026 Staj Hedefi: Full Stack & AI</span
          >
          <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter">
            Merhaba, Ben
            <span
              class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 text-blue-500 underline decoration-blue-500/30 decoration-8 underline-offset-8"
              >Yazılımcı Adayı</span
            >.
          </h1>
          <p class="text-gray-400 text-xl leading-relaxed max-w-2xl">
            Kullanıcı deneyimini ön planda tutan, performans odaklı çözümler
            üretiyorum. Şu an modern web teknolojileri üzerine uzmanlaşıyorum.
          </p>
        </section>

        <section class="bento-item p-8 flex flex-col justify-between">
          <h3 class="text-gray-500 font-bold uppercase tracking-widest text-xs">
            Yetenekler
          </h3>
          <div class="flex flex-wrap gap-2 mt-4">
            <span
              class="bg-blue-500/5 border border-blue-500/20 text-blue-400 px-3 py-1 rounded-xl text-xs font-bold hover:bg-blue-500 hover:text-white transition-colors cursor-default"
              >HTML5</span
            >
            <span
              class="bg-blue-500/5 border border-blue-500/20 text-blue-400 px-3 py-1 rounded-xl text-xs font-bold hover:bg-blue-500 hover:text-white transition-colors cursor-default"
              >Tailwind</span
            >
            <span
              class="bg-blue-500/5 border border-blue-500/20 text-blue-400 px-3 py-1 rounded-xl text-xs font-bold hover:bg-blue-500 hover:text-white transition-colors cursor-default"
              >JavaScript</span
            >
          </div>
        </section>

        <section
          id="contact"
          class="md:col-span-1 bento-item p-8 bg-gradient-to-br from-blue-600 to-blue-900 border-none flex flex-col justify-between group"
        >
          <h2 class="text-2xl font-bold leading-tight">Bağlantıda Kalalım.</h2>
          <div class="flex flex-col gap-3 mt-6">
            <a
              href="mailto:sevdeturaan@gmail.com"
              class="bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex items-center gap-3 transition-all"
            >
              <span>📧</span>
              <span class="text-sm font-bold tracking-wide"
                >E-Posta Gönder</span
              >
            </a>
            <a
              href="https://github.com/sevdeturaan-dot"
              target="_blank"
              class="bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex items-center gap-3 transition-all"
            >
              <span>💻</span>
              <span class="text-sm font-bold tracking-wide">GitHub</span>
            </a>
            <a
              href="https://linkedin.com/in/Sevde Turan"
              target="_blank"
              class="bg-white/10 hover:bg-white/20 p-3 rounded-2xl flex items-center gap-3 transition-all"
            >
              <span>🔗</span>
              <span class="text-sm font-bold tracking-wide">LinkedIn</span>
            </a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
